<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Cinema -  Assentos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<style>
  
body {
  font-family: Arial, sans-serif;
  background:  #121212;
  color: #fff;
  margin: 0;
}

.cinema {
  min-height: calc(100vh - 70px); 
  display: flex;
  justify-content: center; 
  align-items: flex-start; 
  padding-top: 90px; 
}

.container {
  display: flex;
  justify-content: center;
  width: 100%;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

header2 {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 1rem 2rem;
    background: rgba(121, 121, 121, 0.1);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(129, 126, 126, 0.2);
    z-index: 1000;
    animation: slideDown 0.8s ease-out;
}

@keyframes slideDown {
    from {
        transform: translateY(-100%);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
}

.logo {
    font-size: 1.8rem;
    font-weight: bold;
    color: rgb(122, 121, 121);
    text-decoration: none;
    animation: brilho 2s ease-in-out infinite alternate;
}

@keyframes brilho {
    from {
        text-shadow: 0 0 5px rgba(235, 234, 227, 0.5);
    }
    to {
        text-shadow: 0 0 30px rgba(70, 69, 69, 0.582), 0 0 40px rgba(27, 2, 2, 1.0);
    }
}

.nav-links {
    display: flex;
    list-style: none;
    gap: 2rem;
}

.nav-links a {
    color: rgb(143, 140, 140);
    text-decoration: none;
    font-weight: 500;
    transition: all 0.3s ease;
    position: relative;
    padding: 0.5rem 1rem;
}

.nav-links a::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 0;
    height: 2px;
    background: rgb(58, 56, 56);
    transition: all 0.3s ease;
    transform: translateX(-50%);
}

.nav-links a:hover::before {
    width: 100%;
}

.nav-links a:hover {
    transform: translateY(-2px);
}

.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: rgb(238, 197, 14);
    position: relative;
}

.hero-content {
    max-width: 800px;
    padding: 2rem;
    animation: fadeInUp 1s ease-out 0.5s both;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(50px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.hero h1 {
    font-size: 3.5rem;
    margin-bottom: 1rem;
    background: linear-gradient(45deg, #4d3f4a, #524f51);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: textShine 3s ease-in-out infinite;
}

@keyframes textShine {
    0%, 100% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
}

.hero p {
    font-size: 1.2rem;
    margin-bottom: 2rem;
    opacity: 0.9;
    animation: fadeInUp 1s ease-out 0.8s both;
}

.cta-button {
    display: inline-block;
    padding: 1rem 2rem;
    background: linear-gradient(45deg, #302b2f, #1f1c1f);
    color: rgb(243, 243, 243);
    text-decoration: none;
    border-radius: 50px;
    font-weight: bold;
    font-size: 1.1rem;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(204, 129, 182, 0.4);
    animation: fadeInUp 1s ease-out 1.1s both;
}

.cta-button:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 8px 25px rgba(236, 222, 235, 0.8);
}

h1 {
  text-align: center;
  margin-bottom: 40px;
}

.salas {
  display: flex;
  justify-content: space-between;
  gap: 40px;
  flex-wrap: nowrap;
}

.sala {
  background: #2c2c2c;
  padding: 20px;
  border-radius: 8px;
  width: 320px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.sala h2 {
  margin-top: 0;
  text-align: center;
  width: 100%;
}

.tela {
  background: #555;
  height: 30px;
  margin-bottom: 20px;
  border-radius: 5px;
  text-align: center;
  line-height: 30px;
  font-weight: bold;
  color: #ddd;
  width: 100%;
}

.assentos-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr); 
  gap: 12px;
  justify-items: center;
  margin-bottom: 15px;
  width: 100%;
  padding: 0 5px;
  box-sizing: border-box;
}

.assento {
  width: 36px;
  height: 36px;
  background: #444;
  border-radius: 5px;
  cursor: pointer;
  transition: background-color 0.3s;
  user-select: none;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 14px;
  font-weight: bold;
  color: #eee;
  text-align: center;
}

.assento.disponivel:hover {
  background: #eb1f1f;
}

.assento.ocupado {
  background: #d32f2f;
  cursor: not-allowed;
}

.assento.selecionado {
  background: #ffde26;
}

.info {
  font-size: 14px;
  text-align: center;
  width: 100%;
}

button {
  padding: 15px;
  background-color: #ffcc00;
  color: #000;
  border: none;
  border-radius: 4px;
  font-weight: bold;
  cursor: pointer;
  transition: background-color 0.3s ease;
  text-decoration: none;
  justify-content: center; /* centraliza horizontalmente */
  align-items: center; /* centraliza verticalmente */
  
  display: block;
  margin: 0 auto;
}

button:hover {
  background-color: #e6b800;
}
.footer {
  background-color: #333;
  color: white;
  padding: 20px 0;
  text-align: center;
  position: relative;
  bottom: 0;
  width: 100%;
}

.footer-content {
  max-width: 1200px;
  margin: 0 auto;
}

.footer p {
  margin: 0;
  font-size: 14px;
}

.footer-links {
  list-style: none;
  padding: 0;
  margin: 10px 0 0;
}

.footer-links li {
  display: inline;
  margin-right: 15px;
}

.footer-links a {
  color: white;
  text-decoration: none;
}

.footer-links a:hover {
  text-decoration: underline;
}

@media (max-width: 768px) {
  .container {
    padding: 15px;
    max-width: 95%;
  }

  header {
    min-height: 300px; 
    padding: 15px 10px;
  }

  header h1 {
    font-size: 2rem;
  }

  nav {
    flex-direction: column;
    gap: 10px;
  }

  .nav-links {
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }

  .nav-links a {
    padding: 0.5rem;
    font-size: 1rem;
  }

  form label {
    font-size: 0.9rem;
  }

  input, select, textarea, button {
    font-size: 1rem;
  }
}

@media (max-width: 480px) {
  header h1 {
    font-size: 1.5rem;
  }

  .logo {
    font-size: 1.4rem;
  }

  .nav-links a {
    font-size: 0.9rem;
  }

  .container {
    padding: 10px;
  }
}

@media (max-width: 600px) {
  body {
    font-size: 14px;
  }
  nav {
    display: block;
  }
}

@media (min-width: 601px) {
  nav {
    display: flex;
  }
}



</style>

<body>
</head>
<body>
    <header2>
        <nav>
            <a href="#" class="logo">Cinepipoca</a>
            <ul class="nav-links">
                 <li><a href="index.html">Inicio</a></li>
                 <li><a href="sobre.html">Sobre</a></li>
                 <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header2>
    

  <section class="cinema" id="cinema">
    <div class="container">

      <div class="salas">
        <div class="sala" data-sala="1">
          <h2>Sala 1</h2>
          <div class="tela">Tela</div>
          <div class="assentos-grid"></div>
          <p class="info">Assentos selecionados: <span class="selecionados">0</span></p>
        </div>

        <div class="sala" data-sala="2">
          <h2>Sala 2</h2>
          <div class="tela">Tela</div>
          <div class="assentos-grid"></div>
          <p class="info">Assentos selecionados: <span class="selecionados">0</span></p>
        </div>

        <div class="sala" data-sala="3">
          <h2>Sala 3</h2>
          <div class="tela">Tela</div>
          <div class="assentos-grid"></div>
          <p class="info">Assentos selecionados: <span class="selecionados">0</span></p>
        </div>
      </div>
    </div>
   
  </section>
 <a href="reserva.html">
    <button>Reservar assentos</button>
  </a>

  <section class="footerr" id="footer"></section>
  <footer class="footer">
  <div class="footer-content">
    <p>&copy; 2025 - Todos os direitos reservados.</p>
    <ul class="footer-links">
    </ul>
  </div>
</footer>
 

  <script>
    document.addEventListener('DOMContentLoaded', () => {
  const linhas = 5;
  const colunas = 6;

  const assentosOcupados = {
    1: [3, 7, 8, 15],
    2: [1, 5, 6, 12, 30],
    3: [2, 4, 11, 19, 27]
  };

  const salas = document.querySelectorAll('.sala');

  salas.forEach(sala => {
    const salaId = sala.dataset.sala;
    const grid = sala.querySelector('.assentos-grid');
    const selecionadosSpan = sala.querySelector('.selecionados');

    for (let i = 1; i <= linhas * colunas; i++) {
      const assento = document.createElement('div');
      assento.classList.add('assento');
      assento.textContent = i;

      if (assentosOcupados[salaId]?.includes(i)) {
        assento.classList.add('ocupado');
      } else {
        assento.classList.add('disponivel');

        assento.addEventListener('click', () => {
          assento.classList.toggle('selecionado');
          atualizarSelecionados();
        });
      }

      grid.appendChild(assento);
    }

    function atualizarSelecionados() {
      const selecionados = grid.querySelectorAll('.selecionado').length;
      selecionadosSpan.textContent = selecionados;
    }
  });
});
  </script>
</body>
</html>
