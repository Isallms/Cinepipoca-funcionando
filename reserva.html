<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f7f9fc;
    color: #333;
    overflow-x: hidden; /* Evita barras laterais em animações */
    
}

/* Reset básico */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}



/* --- Header com animação de entrada --- */
header2 {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 1rem 2rem;
    background: rgba(0, 0, 0, 0.1);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(219, 95, 95, 0.2);
    z-index: 1000;
    animation: slideDown 0.8s ease-out;
}

/* Animação slideDown */
@keyframes slideDown {
    from {
        transform: translateY(-100%);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

/* --- Navegação --- */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
}

/* Logo */
.logo {
    font-size: 1.8rem;
    font-weight: bold;
    color: rgb(12, 12, 12);
    text-decoration: none;
    animation: brilho 2s ease-in-out infinite alternate;
}

/* Animação brilho */
@keyframes brilho {
    from {
        text-shadow: 0 0 5px rgba(235, 234, 227, 0.5);
    }
    to {
        text-shadow: 0 0 30px rgba(71, 67, 64, 0.582), 0 0 40px rgba(27, 2, 2, 1.0);
    }
}

/* Lista de links */
.nav-links {
    display: flex;
    list-style: none;
    gap: 2rem;
}

/* Links */
.nav-links a {
    color: rgb(0, 0, 0);
    text-decoration: none;
    font-weight: 500;
    transition: all 0.3s ease;
    position: relative;
    padding: 0.5rem 1rem;
}

/* Linha animada embaixo do link */
.nav-links a::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 0;
    height: 2px;
    background: rgb(58, 56, 56);
    transition: all 0.3s ease;
    transform: translateX(-50%);
}

/* Linha aparece no hover */
.nav-links a:hover::before {
    width: 100%;
}

/* Link levanta no hover */
.nav-links a:hover {
    transform: translateY(-2px);
}

/* --- Seção Principal (Hero) --- */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: rgb(238, 197, 14);
    position: relative;
}

/* Conteúdo do Hero */
.hero-content {
    max-width: 800px;
    padding: 2rem;
    animation: fadeInUp 1s ease-out 0.5s both;
}

/* Animação fadeInUp */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(50px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Título H1 do Hero */
.hero h1 {
    font-size: 3.5rem;
    margin-bottom: 1rem;
    background: linear-gradient(45deg, #4d3f4a, #524f51);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: textShine 3s ease-in-out infinite;
}

/* Animação brilho texto */
@keyframes textShine {
    0%, 100% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
}

/* Parágrafo do Hero */
.hero p {
    font-size: 1.2rem;
    margin-bottom: 2rem;
    opacity: 0.9;
    animation: fadeInUp 1s ease-out 0.8s both;
}

/* Botão CTA */
.cta-button {
    display: inline-block;
    padding: 1rem 2rem;
    background: linear-gradient(45deg, #302b2f, #1f1c1f);
    color: rgb(243, 243, 243);
    text-decoration: none;
    border-radius: 50px;
    font-weight: bold;
    font-size: 1.1rem;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(204, 129, 182, 0.4);
    animation: fadeInUp 1s ease-out 1.1s both;
}

/* Hover no botão CTA */
.cta-button:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 8px 25px rgba(236, 222, 235, 0.8);
}


.card {
    max-width: 1300px;  /* Aumentei para 400px */
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(20, 20, 20, 0.1);
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 20px auto;
    }

    .card:hover {
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .card img {
      width: 100%;      /* continua ocupando 100% do card */
      height: 300px;    /* defino uma altura maior */
      object-fit: cover; /* preenche sem distorcer */
}

  .card:hover img {
      transform: scale(1.05); /* aumenta 5% ao passar o mouse */
    }

    .card-body {
      padding: 15px;
    }

    .card-title {
      font-variant: 1.2rem;
      margin-bottom: 10px;
      color: #333;
    }

    .card-link {
      display: inline-block;
      margin-top: 10px;
      text-decoration: none;
      color: #f52828;
      font-weight: bold;
      transition: color 0.3s ease;
    }

    .card-link:hover {
      color: #ff0000;
    }


.container {
    max-width: 1300px;
    margin: auto;
    padding: 20px;
}




/* Header unificado com suporte às partículas */
header {
    background: linear-gradient(135deg, #e23939 0%, #9b0505 100%);
    color: white;
    padding: 20px 0; /* Removi o padding para facilitar o centralizar */
    position: relative; /* Necessário para posicionar as partículas */
    overflow: hidden; /* Evita que partículas vazem para fora */
    min-height: 400px; /* Altura mínima para conter as partículas */
    
    margin-bottom: 10rem; /* Espaço abaixo do parágrafo */
    /* Flexbox para centralizar */
    display: flex;
    justify-content: center; /* Centraliza horizontalmente */
    align-items: center;     /* Centraliza verticalmente */
    flex-direction: column;  /* Para alinhar itens em coluna (caso queira adicionar mais elementos) */
}


header h1 {
    margin: 0; /* elimina margens que atrapalham o centralizar */
    font-size: 2.5rem;
    text-align: center;
    position: relative;
    z-index: 2;
}

header nav {
    position: relative;
    z-index: 2; /* Acima das partículas */
}



/* Partículas base (pontos azuis claros, como bolhas) */
.particle {
    position: absolute;
    top: 0; /* Posicionamento inicial no topo do header para controle melhor */
    background-color: rgba(241, 229, 229, 0.6); /* Branco translúcido para contraste no azul */
    border-radius: 50%; /* Formato de bolha/círculo */
    animation: float-up 6s linear infinite; /* Animação base de flutuar para cima */
    pointer-events: none; /* Evita interferência com cliques no header */
}

/* Variações de partículas para diversidade (tamanho, posição inicial e delay) */
.particle-1 {
    width: 4px;
    height: 4px;
    left: 10%;
    animation-delay: 0s;
    animation-duration: 8s;
}

.particle-2 {
    width: 6px;
    height: 6px;
    left: 20%;
    animation-delay: 1s;
    animation-duration: 7s;
}

.particle-3 {
    width: 3px;
    height: 3px;
    left: 30%;
    animation-delay: 2s;
    animation-duration: 9s;
}

.particle-4 {
    width: 5px;
    height: 5px;
    left: 40%;
    animation-delay: 0.5s;
    animation-duration: 6s;
}

.particle-5 {
    width: 4px;
    height: 4px;
    left: 50%;
    animation-delay: 3s;
    animation-duration: 8s;
}

.particle-6 {
    width: 7px;
    height: 7px;
    left: 60%;
    animation-delay: 1.5s;
    animation-duration: 7s;
}

.particle-7 {
    width: 3px;
    height: 3px;
    left: 70%;
    animation-delay: 4s;
    animation-duration: 10s;
}

.particle-8 {
    width: 5px;
    height: 5px;
    left: 80%;
    animation-delay: 2.5s;
    animation-duration: 6s;
}

.particle-9 {
    width: 4px;
    height: 4px;
    left: 90%;
    animation-delay: 3.5s;
    animation-duration: 9s;
}

/* Animação principal: flutuar para cima com movimento lateral sutil e fade */
@keyframes float-up {
    0% {
        opacity: 0;
        transform: translateY(100vh) translateX(0px) scale(0); /* Começa fora da tela, pequeno */
    }
    10% {
        opacity: 1;
        transform: translateY(90vh) translateX(0px) scale(1); /* Aparece e cresce */
    }
    90% {
        opacity: 1;
        transform: translateY(10vh) translateX(var(--lateral-move, 20px)) scale(1); /* Move lateralmente (definido por var) */
    }
    100% {
        opacity: 0;
        transform: translateY(-10vh) translateX(var(--lateral-move, -10px)) scale(0); /* Sai da tela, fade out */
    }
}
