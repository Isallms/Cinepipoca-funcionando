<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Detalhes do Filme</title>




<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
  }
  body {
  background-color: #0a0a0a;
  color: #eee;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#detalhe {
  background: linear-gradient(135deg, #b71c1c, #3a0000);
  border-radius: 12px;
  padding: 25px;
  max-width: 600px;
  width: 90%;
  box-shadow: 0 0 20px rgba(183, 28, 28, 0.7);
  text-align: center;
}

#detalhe img {
  max-width: 100%;
  border-radius: 10px;
  box-shadow: 0 0 15px #b71c1c;
  margin-bottom: 20px;
}

#detalhe h1 {
  margin-bottom: 12px;
  font-size: 2.4rem;
  text-shadow: 2px 2px 5px #000;
}

#detalhe p {
  font-size: 1.1rem;
  line-height: 1.5;
  color: #f2f2f2;
  text-shadow: 1px 1px 3px #000;
}

a {
  margin-top: 30px;
  text-decoration: none;
  color: #b71c1c;
  font-weight: 600;
  font-size: 1.1rem;
  border: 2px solid #b71c1c;
  padding: 10px 18px;
  border-radius: 8px;
  transition: background-color 0.3s ease, color 0.3s ease;
}

a:hover {
  background-color: #b71c1c;
  color: #0a0a0a;
  box-shadow: 0 0 10px #f44336;
}

  .container {
    max-width: 600px;
    margin: auto;
  }
  img {
    max-width: 100%;
    border-radius: 8px;
  }
  h1 {
    margin-top: 15px;
  }
  p {
    margin-top: 10px;
    font-size: 16px;
  }
  a {
    display: inline-block;
    margin-top: 20px;
    text-decoration: none;
    color: rgb(238, 197, 14);
  }

  .footer {
  background-color: #333;
  color: white;
  padding: 20px 0;
  text-align: center;
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  z-index: 1000; 
}

.footer-content {
  max-width: 1200px;
  margin: 0 auto;
}

.footer p {
  margin: 0;
  font-size: 14px;
}

.footer-links {
  list-style: none;
  padding: 0;
  margin: 10px 0 0;
}

.footer-links li {
  display: inline;
  margin-right: 15px;
}

.footer-links a {
  color: white;
  text-decoration: none;
}

.footer-links a:hover {
  text-decoration: underline;
}

@media (max-width: 768px) {
  .container {
    padding: 15px;
    max-width: 95%;
  }

  header {
    min-height: 300px; 
    padding: 15px 10px;
  }

  header h1 {
    font-size: 2rem;
  }

  nav {
    flex-direction: column;
    gap: 10px;
  }

  .nav-links {
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }

  .nav-links a {
    padding: 0.5rem;
    font-size: 1rem;
  }

  form label {
    font-size: 0.9rem;
  }

  input, select, textarea, button {
    font-size: 1rem;
  }
}

@media (max-width: 480px) {
  header h1 {
    font-size: 1.5rem;
  }

  .logo {
    font-size: 1.4rem;
  }

  .nav-links a {
    font-size: 0.9rem;
  }

  .container {
    padding: 10px;
  }

  button {
    font-size: 0.95rem;
    padding: 10px;
  }
}


  
</style>
</head>
<body>
<div class="container" id="detalhe"></div>
<a href="index.html">Voltar ao catálogo</a>

<a href="assentos.html">
Reservar Assentos
</a>

<script>
  const filmes = [
    {
      id: 1,
      titulo: "O Poderoso Chefão",
      descricao: "Um filme clássico sobre a máfia.",
      imagem: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRL4HQN8OtsAwOPL-PkjVChficGjcyDn54xvg&s",
      detalhes: "O Poderoso Chefão é um filme dirigido por Francis Ford Coppola, baseado no livro de Mario Puzo. É um marco do cinema, contando a história da família Corleone. <br> Horários: <br>14:00 <br>17:00 <br>20:00 <br>22:30"
    },
    {
      id: 2,
      titulo: "Matrix",
      descricao: "Um hacker descobre a verdade sobre a realidade.",
      imagem: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR9eyF_d2BmIQxoCL5Jy6yobsQJs3jGPN9qUQ&s",
      detalhes: "Matrix é um filme de ficção científica que explora o conceito de realidade simulada. Dirigido pelas irmãs Wachowski, revolucionou efeitos especiais. <br> Horários: <br>14:00 <br>17:00 <br>20:00 <br>22:30"
    },
    {
      id: 3,
      titulo: "Interestelar",
      descricao: "Viagem espacial em busca de um novo lar para a humanidade.",
      imagem: "https://tse3.mm.bing.net/th/id/OIP.1JBRgNpAyR0aVJON2wg6LAHaEo?cb=12&rs=1&pid=ImgDetMain&o=7&rm=3",
      detalhes: "Interestelar, dirigido por Christopher Nolan, aborda viagens espaciais e relatividade. Uma história emocionante sobre sobrevivência e amor. <br> Horários: <br>14:00 <br>17:00 <br>20:00 <br>22:30"
    }
  ]

  function getParametro(name) {
    return new URLSearchParams(window.location.search).get(name)
  }

  const id = Number(getParametro('id'))
  const filme = filmes.find(f => f.id === id)
  const container = document.getElementById('detalhe')

  if (filme) {
    container.innerHTML = `
      <img src="${filme.imagem}" alt="${filme.titulo}" />
      <h1>${filme.titulo}</h1>
      <p>${filme.detalhes}</p>
    `
  } else {
    container.innerHTML = '<p>Filme não encontrado.</p>'
  }
</script>

<footer class="footer">
  <div class="footer-content">
    <p>&copy; 2025 - Todos os direitos reservados.</p>
    <ul class="footer-links">
    </ul>
  </div>
</footer>


</body>
</html>
